      function showMenu() {
        state = "menu";
        menuIndex = 0;
        player = null;
        enemy = null;
        projectiles.length = 0;
        particles.length = 0;
        effects.length = 0;
        trails.length = 0;
        hitStops.length = 0;
        timeStop = null;
        gameMode = "cpu";
        overlay.classList.remove("hidden");
        overlay.innerHTML = `
          <div class="panel">
            <h1>${t("title")}</h1>
            <p class="subline">${t("current")}: ${charName(selectedChar)} · ${charTag(selectedChar)}</p>
            <div class="menuActions">
              <button class="primary" data-action="start">${t("vsCpu")}</button>
              <button data-action="versus">${t("playerBattle")}</button>
              <button data-action="training">${t("training")}</button>
              <button data-action="select">${t("select")}</button>
              <button data-action="tutorial">${t("tutorial")}</button>
              <button data-action="language">${t("language")}: ${t("switchLanguage")}</button>
              <button data-action="difficulty">${t("difficultyMenu")}: ${diffLabel(difficultyKey)}</button>
            </div>
          </div>
        `;
        syncMenuSelection();
      }

      function showCharacterSelect() {
        state = "select";
        menuIndex = 0;
        overlay.classList.remove("hidden");
        overlay.innerHTML = `
          <div class="panel">
            <h2>${t("chooseFighter")}</h2>
            <p class="subline">${t("fighterHint")}</p>
            <div class="grid">
              ${chars.map((c) => `
                <button class="fighterCard ${c.id === selectedChar ? "selected" : ""}" data-char="${c.id}">
                  <canvas class="portrait" width="164" height="164" aria-label="${charName(c)}"></canvas>
                  <strong>${charName(c)}</strong>
                  <span>${charBlurb(c)}</span>
                </button>
              `).join("")}
            </div>
            <div class="row">
              <button data-action="back">${t("back")}</button>
              <button class="primary" data-action="play">${t("vsCpu")}</button>
            </div>
          </div>
        `;
        overlay.querySelectorAll(".fighterCard").forEach((card) => {
          drawPortrait(card.querySelector("canvas"), Number(card.dataset.char));
        });
        syncMenuSelection();
      }

      function showDifficulty() {
        state = "difficulty";
        menuIndex = difficultyKey === "easy" ? 0 : difficultyKey === "hard" ? 2 : difficultyKey === "hell" ? 3 : 1;
        overlay.classList.remove("hidden");
        overlay.innerHTML = `
          <div class="panel">
            <h2>${t("difficultyTitle")}</h2>
            <p class="subline">${t("difficultyHint")}</p>
            <div class="difficulty">
              <button data-diff="easy">${t("easy")}</button>
              <button class="primary" data-diff="normal">${t("normal")}</button>
              <button data-diff="hard">${t("hard")}</button>
              <button data-diff="hell">${t("hell")}</button>
            </div>
            <div class="row">
              <button data-action="back">${t("back")}</button>
            </div>
          </div>
        `;
        syncMenuSelection();
      }

      function showTutorial() {
        state = "tutorial";
        menuIndex = 0;
        overlay.classList.remove("hidden");
        overlay.innerHTML = `
          <div class="panel">
            <h2>${t("tutorialTitle")}</h2>
            <p class="subline">${t("tutorialBody")}</p>
            <p class="subline">${t("roleSkills")}</p>
            <div class="menuActions">
              <button class="primary" data-action="back">${t("back")}</button>
            </div>
          </div>
        `;
        syncMenuSelection();
      }

      function showGameOver() {
        overlay.classList.remove("hidden");
        overlay.innerHTML = `
          <div class="panel">
            <h1>${roundMessage}</h1>
            <p class="subline">${charName(player.id)} ${t("battleVs")} ${charName(enemy.id)}</p>
            <div class="menuActions">
              <button class="primary" data-action="rematch">${t("rematch")}</button>
              <button data-action="select">${t("select")}</button>
              <button data-action="menu">${t("mainMenu")}</button>
            </div>
          </div>
        `;
        syncMenuSelection();
      }

      function menuButtons() {
        return Array.from(overlay.querySelectorAll("button"));
      }

      function syncMenuSelection() {
        const buttons = menuButtons();
        if (!buttons.length) return;
        menuIndex = clamp(menuIndex, 0, buttons.length - 1);
        buttons.forEach((button, index) => {
          button.classList.toggle("selectedMenu", index === menuIndex);
        });
      }

      function activateSelectedMenu() {
        const buttons = menuButtons();
        const button = buttons[menuIndex];
        if (button) button.click();
      }

      function startFight(diff, mode = gameMode) {
        difficultyKey = diff;
        gameMode = mode;
        state = "fight";
        overlay.classList.add("hidden");
        stageIndex = Math.floor(Math.random() * stages.length);
        player = makeFighter(selectedChar, "left", true, diff);
        enemy = mode === "training" ? makeTrainingDummy("right") : makeFighter(choice(chars).id, "right", mode === "pvp", diff);
        projectiles.length = 0;
        particles.length = 0;
        effects.length = 0;
        trails.length = 0;
        hitStops.length = 0;
        timeStop = null;
        burst(W / 2, GROUND - 80, "#f6d46e", 26);
        playSfx(mode === "training" ? "ui" : "awaken");
      }

      overlay.addEventListener("click", (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        unlockAudio();
        playSfx("ui");
        const action = target.dataset.action;
        const char = target.dataset.char;
        const diff = target.dataset.diff;
        if (char) {
          selectedChar = Number(char);
          showCharacterSelect();
          return;
        }
        if (diff) {
          difficultyKey = diff;
          showMenu();
          return;
        }
        if (action === "start" || action === "play") startFight(difficultyKey, "cpu");
        if (action === "training") startFight("easy", "training");
        if (action === "difficulty") showDifficulty();
        if (action === "tutorial") showTutorial();
        if (action === "versus") startFight("normal", "pvp");
        if (action === "language") {
          language = language === "en" ? "zh" : "en";
          showMenu();
        }
        if (action === "select") showCharacterSelect();
        if (action === "back") showMenu();
        if (action === "menu") showMenu();
        if (action === "rematch") startFight(difficultyKey);
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.length === 1 ? event.key.toLowerCase() : event.key;
        unlockAudio();
        if (["w", "a", "s", "d", "j", "k", "l", "e", "n", "m", "f", " ", "Enter", "Escape", "ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Shift", "1", "2", "3", "4", "5", "6", "0"].includes(key)) {
          event.preventDefault();
        }
        if (state !== "fight" && ["menu", "select", "difficulty", "tutorial", "over"].includes(state)) {
          if (key === "ArrowDown" || key === "s") {
            menuIndex += 1;
            syncMenuSelection();
            playSfx("ui");
            return;
          }
          if (key === "ArrowUp" || key === "w") {
            menuIndex -= 1;
            syncMenuSelection();
            playSfx("ui");
            return;
          }
          if (key === "Enter") {
            activateSelectedMenu();
            return;
          }
          if (key === "Escape" && state !== "menu") {
            showMenu();
            return;
          }
        } else if (state === "fight" && key === "Escape") {
          showMenu();
          return;
        }
        if (!keys.has(key)) pressed.add(key);
        keys.add(key);
      });

      window.addEventListener("keyup", (event) => {
        const key = event.key.length === 1 ? event.key.toLowerCase() : event.key;
        releaseGameKey(key);
      });

      if (touchControls) {
        for (const button of touchControls.querySelectorAll("[data-touch-key]")) {
          const readKey = () => normalizeTouchKey(button.dataset.touchKey);
          button.addEventListener("pointerdown", (event) => {
            event.preventDefault();
            unlockAudio();
            const key = readKey();
            button.classList.add("activeTouch");
            if (button.setPointerCapture) button.setPointerCapture(event.pointerId);
            if (key === "Escape") {
              if (state === "fight" || state !== "menu") showMenu();
              return;
            }
            if (key === "Enter" && state !== "fight") {
              activateSelectedMenu();
              return;
            }
            pressGameKey(key);
          });
          const endTouch = (event) => {
            event.preventDefault();
            button.classList.remove("activeTouch");
            const key = readKey();
            if (key !== "Escape" && key !== "Enter") releaseGameKey(key);
          };
          button.addEventListener("pointerup", endTouch);
          button.addEventListener("pointercancel", endTouch);
          button.addEventListener("pointerleave", endTouch);
        }
      }

      window.addEventListener("pointerdown", () => {
        unlockAudio();
      });

      window.addEventListener("mousedown", () => {
        unlockAudio();
      });

      window.addEventListener("touchstart", () => {
        unlockAudio();
      }, { passive: true });

      window.addEventListener("focus", () => {
        if (audioEngine.unlocked) unlockAudio();
      });

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden && audioEngine.unlocked) unlockAudio();
      });

      registerServiceWorker();
      preloadSpriteImages();
      preloadStageImages();
      showMenu();
      loop();
    })();
  </script>
</body>
</html>
