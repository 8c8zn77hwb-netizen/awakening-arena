  <style>
    :root {
      color-scheme: dark;
      --ink: #f5f0de;
      --muted: #b8b0a0;
      --panel: rgba(16, 18, 25, 0.92);
      --line: rgba(255, 255, 255, 0.16);
      --accent: #e8c766;
      --red: #e5574f;
      --blue: #5aa9e8;
      --green: #62c18b;
      --violet: #9a7be8;
      --bg: #10131b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:

      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    body {
      display: grid;
      place-items: center;
    }

    #gameShell {
      position: relative;
      width: min(100vw, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      max-width: 1180px;
      background: #0f1118;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow: 0 18px 70px rgba(0, 0, 0, 0.48);
    }

    #gameShell,
    canvas,
    #touchControls {
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      background: #111722;
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: clamp(16px, 4vw, 44px);
      background:
        radial-gradient(circle at 50% 16%, rgba(232, 199, 102, 0.12), transparent 36%),
        linear-gradient(180deg, rgba(14, 17, 26, 0.2), rgba(14, 17, 26, 0.88)),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 5px);
    }

    #touchControls {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: none;
      pointer-events: none;
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    }

    .touchCluster {
      position: absolute;
      display: grid;
      gap: 8px;
      pointer-events: auto;
    }

    .touchMove {
      left: max(12px, env(safe-area-inset-left));
      bottom: max(12px, env(safe-area-inset-bottom));
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      align-items: center;
      justify-items: center;
    }

    .touchActions {
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      grid-template-columns: repeat(4, 46px);
      grid-template-rows: repeat(3, 46px);
    }

    .touchSystem {
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .touchBtn {
      width: 46px;
      min-width: 0;
      min-height: 0;
      height: 46px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(16, 18, 25, 0.72);
      color: #f6e6a8;
      font-size: 14px;
      font-weight: 900;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.38), 0 0 18px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(4px);
    }

    .touchBtn:active,
    .touchBtn.activeTouch {
      transform: translateY(2px);
      background: rgba(232, 199, 102, 0.34);
      border-color: #f6d46e;
      color: #ffffff;
    }

    .touchBtn.big {
      width: 68px;
    }

    .touchBtn.jump {
      grid-column: 2;
      grid-row: 1;
    }

    .touchBtn.left {
      grid-column: 1;
      grid-row: 2;
    }

    .touchBtn.crouch {
      grid-column: 2;
      grid-row: 3;
    }

    .touchBtn.right {
      grid-column: 3;
      grid-row: 2;
    }

    @media (pointer: coarse) {
      #touchControls {
        display: block;
      }
    }

    #overlay.hidden {
      display: none;
    }

    .panel {
      width: min(900px, 100%);
      max-height: min(92vh, 92%);

      border-radius: 8px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);

      margin-top: 28px;
    }

      background: #222736;

    button:hover,

      background: #2f3548;
    }

    button.primary {
      background: #8b342f;

    }

    button.selectedMenu {

    }

    .grid {

        grid-template-rows: repeat(3, 40px);
      }

        height: 40px;

      function ensureAudioRunning() {
        if (!audioEngine.ctx) return;
        const resume = audioEngine.ctx.state === "suspended" ? audioEngine.ctx.resume() : null;
        if (resume && resume.then) {
          resume.then(() => startMusic()).catch(() => {});
        } else {
          startMusic();
        }
      }

      function unlockAudio() {
        if (audioEngine.unlocked) {
          ensureAudioRunning();
          return;
        }
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) return;
        const ctxAudio = new AudioCtor();
        const master = ctxAudio.createGain();
        const musicGain = ctxAudio.createGain();
        const sfxGain = ctxAudio.createGain();
        master.gain.value = 1.0;
        musicGain.gain.value = 0.2;
        sfxGain.gain.value = 1.0;
        musicGain.connect(master);
        sfxGain.connect(master);
        master.connect(ctxAudio.destination);
        audioEngine.ctx = ctxAudio;
        audioEngine.master = master;
        audioEngine.musicGain = musicGain;
        audioEngine.sfxGain = sfxGain;
        audioEngine.unlocked = true;
        ensureAudioRunning();
        setTimeout(() => playSfx("ui"), 20);
      }

      function envGain(destination, gain, attack, release, delay = 0) {
        const ctxAudio = audioEngine.ctx;
        const g = ctxAudio.createGain();
        const now = ctxAudio.currentTime + delay;
        g.gain.setValueAtTime(0.0001, now);
        g.gain.exponentialRampToValueAtTime(Math.max(0.0001, gain), now + attack);
        g.gain.exponentialRampToValueAtTime(0.0001, now + attack + release);
        g.connect(destination);
        return { gain: g, start: now, stop: now + attack + release + 0.04 };
      }

        const target = dest || audioEngine.sfxGain;
        const osc = ctxAudio.createOscillator();
        const eg = envGain(target, gain, 0.006, duration, delay);

        const h = fighterHeight(f) * (f.crouch ? 0.72 : 1);
        const x = xOverride == null ? f.x : xOverride;
        return {
          left: x - w / 2,
          right: x + w / 2,
          top: f.y - h,
          bottom: f.y,
          w,
          h
        };
      }

      function overlap(a, b) {
        return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;

      function addShake(power, time) {

      function separateFighters(a, b) {
        if (!a || !b || a.hp <= 0 || b.hp <= 0) return;
        if (a.dodgeTimer > 0 || b.dodgeTimer > 0) return;
        const abox = bodyBox(a);
        const bbox = bodyBox(b);
        const verticalOverlap = abox.bottom > bbox.top + 12 && bbox.bottom > abox.top + 12;
        if (!verticalOverlap) return;
        const minGap = (abox.w + bbox.w) / 2 + 10;
        const distance = b.x - a.x;
        const absDistance = Math.abs(distance);
        if (absDistance >= minGap) return;
        const dir = distance >= 0 ? 1 : -1;
        const push = (minGap - absDistance) / 2;
        const aWeight = a.dodgeTimer > 0 ? 0.35 : 1;
        const bWeight = b.dodgeTimer > 0 ? 0.35 : 1;
        const total = aWeight + bWeight;
        a.x = clamp(a.x - dir * push * (bWeight / total) * 2, 42, W - 42);
        b.x = clamp(b.x + dir * push * (aWeight / total) * 2, 42, W - 42);
        a.vx *= 0.45;
        b.vx *= 0.45;
      }

      function attackStats(f, type, clonePower = 1) {
        const awake = f.awaken > 0;
        const sword = f.id === 2 && awake;
        const big = f.id === 1 && awake;
        if (type === "wave") {
          return { damage: 8 * clonePower, range: 0, windup: 0, active: 0, recovery: 0, knock: 4 };
        }
        if (type === "airHoming") {
          return {
            damage: (awake ? 12 : 9) * attackMultiplier(f) * clonePower,
            range: 54,
            windup: 4,
            active: 15,
            recovery: 13,
            knock: awake ? 8 : 6
          };
        }
        if (type === "dodgeCounter") {
          return {
            damage: 26 * attackMultiplier(f) * clonePower,
            range: 104,
            windup: 4,
            active: 14,
            recovery: 16,
            knock: 22
          };

        if (type === "standRush") {
          return {
            damage: 5.4 * attackMultiplier(f) * clonePower,
            range: 92,
            windup: 0,
            active: 5,
            recovery: 0,
            knock: 3
          };
        }
        if (type === "airHeavyDown") {
          return {
            damage: 19 * attackMultiplier(f) * clonePower,
            range: (f.awaken > 0 ? 125 : 92),
            windup: 9,
            active: 14,
            recovery: 18,
            knock: 12
          };
        }
        const isHeavy = type === "heavy" || type === "lowHeavy";
        const isLow = type === "lowLight" || type === "lowHeavy";
        const base = isHeavy
          ? { damage: 18, range: 82, windup: 14, active: 10, recovery: 22, knock: 11 }
          : { damage: 8, range: 68, windup: 5, active: 8, recovery: 2, knock: 5 };
        if (isLow) {
          base.range += isHeavy ? 10 : 7;
          base.damage += isHeavy ? -1 : 0;
          base.windup += isHeavy ? 1 : 0;
          base.active += 2;
          base.knock += isHeavy ? 2 : 1;
        }
        if (f.id === 1) {
          base.damage += isHeavy ? 3 : 1;
          base.windup += isHeavy ? 3 : 1;
          base.recovery += isHeavy ? 3 : 0;
          base.knock += isHeavy ? 3 : 1;
        }
        if (f.id === 2) {
          base.range += isHeavy ? 32 : 22;
          base.windup += isHeavy ? 1 : 0;
          base.recovery += isHeavy ? 4 : 2;
        }
        if (f.id === 3) {
          base.windup = Math.max(3, base.windup - (isHeavy ? 2 : 3));
          base.recovery = Math.max(7, base.recovery - (isHeavy ? 4 : 3));
          base.damage -= isHeavy ? 1 : 2;
          base.knock += isHeavy ? 1 : 0;
        }
        if (f.id === 4) {
          base.active += isHeavy ? 2 : 1;
          base.damage += f.awaken > 0 ? 1 : 0;
        }
        if (f.id === 5) {
          base.range += f.awaken > 0 ? (isHeavy ? 22 : 16) : (isHeavy ? 8 : 4);
          base.damage += f.awaken > 0 ? (isHeavy ? 4 : 2) : (isHeavy ? 1 : 0);
          if (f.awaken > 0 && isHeavy) base.windup = Math.max(8, base.windup - 1);
          base.active += f.awaken > 0 ? 2 : 0;
          base.knock += f.awaken > 0 ? (isHeavy ? 4 : 2) : 1;
        }
        if (f.id === 6) {
          base.range += f.awaken > 0 ? (isHeavy ? 26 : 18) : (isHeavy ? 12 : 7);
          base.damage += f.awaken > 0 ? (isHeavy ? 4 : 2) : (isHeavy ? 2 : 0);
          base.windup += isHeavy ? 2 : 1;
          base.recovery += isHeavy ? 2 : 1;
          base.knock += f.awaken > 0 ? (isHeavy ? 5 : 2) : 2;
        }
        if (f.id === 7) {
          base.range += f.awaken > 0 ? (isHeavy ? 46 : 34) : (isHeavy ? 36 : 26);
          base.damage += f.awaken > 0 ? (isHeavy ? 3 : 1) : (isHeavy ? 1 : 0);
          base.windup = Math.max(4, base.windup - (isHeavy ? 1 : 2));
          base.active += 2;
          base.knock += isHeavy ? 3 : 1;
        }
        if (f.id === 8) {

          base.damage += f.awaken > 0 ? (isHeavy ? 3 : 1) : 0;

          base.active += isHeavy ? 1 : 2;
          base.damage += f.awaken > 0 ? (isHeavy ? 4 : 2) : (isHeavy ? 1 : 0);

        if (f.id === 11) {

          base.damage += f.awaken > 0 ? (isHeavy ? 3 : 1) : 0;
          base.windup = Math.max(4, base.windup - (f.awaken > 0 ? 2 : 0));
          base.active += f.awaken > 0 ? 2 : 1;
          base.recovery += f.awaken > 0 ? (isHeavy ? 2 : 0) : 0;
          base.knock += isHeavy ? 2 : 0;
          if (f.crawlTimer > 0) {

        if (f.id === 12) {
          base.range += f.awaken > 0 ? (isHeavy ? 42 : 24) : (isHeavy ? 20 : 10);

        if (f.id === 13) {

          base.knock += f.awaken > 0 ? (isHeavy ? 4 : 2) : 1;

        if (f.id === 14) {
          base.range += f.awaken > 0 ? (isHeavy ? 58 : 40) : (isHeavy ? 42 : 30);
          base.damage += f.awaken > 0 ? (isHeavy ? 3 : 1) : (isHeavy ? 1 : 0);
          base.windup = Math.max(4, base.windup - (isHeavy ? 1 : 2));
          base.active += 2;
          base.knock += isHeavy ? 3 : 1;
        }
        if (f.id === 15) {
          if (f.duoMode === "scientist") {
            base.range += isHeavy ? 34 : 18;
            base.damage += isHeavy ? 1 : -1;
            base.windup += isHeavy ? 3 : 1;
            base.recovery += isHeavy ? 3 : 1;
            base.knock += isHeavy ? 2 : 0;
          } else {
            base.range += isHeavy ? 12 : 6;
            base.windup = Math.max(3, base.windup - (isHeavy ? 1 : 2));
            base.recovery = Math.max(isHeavy ? 9 : 1, base.recovery - (isHeavy ? 2 : 1));
            base.damage += isHeavy ? 0 : -1;
            if (f.duoSaberTimer > 0) {
              base.range += isHeavy ? 70 : 56;
              base.damage += isHeavy ? 6 : 3;
              base.windup = Math.max(2, base.windup - 3);
              base.active += 3;
              base.knock += isHeavy ? 5 : 2;

        if (sword) {

          base.windup += isHeavy ? 3 : 1;

        if (big) {
          base.range += 28;
          base.damage += isHeavy ? 5 : 3;

        return {
          damage: base.damage * attackMultiplier(f) * clonePower,
          range: base.range,
          windup: base.windup,
          active: base.active,
          recovery: base.recovery,

      function staminaCost(type) {
        if (type === "light" || type === "lowLight") return 7;

          timer: 0,

      function startHomingStrike(f, target) {
        if (isBusy(f) || f.guard || !target) return false;

        f.attack = {
          type: "airHoming",
          timer: 0,
          windup: stats.windup,
          active: stats.active,
          recovery: stats.recovery,
          hasHit: false,
          target
        };
        f.comboFlash = 18;
        const dx = target.x - f.x;
        const dy = target.y - 58 - (f.y - 52);
        const length = Math.max(1, Math.hypot(dx, dy));
        f.vx = (dx / length) * (f.awaken > 0 ? 13.2 : 10.8);
        f.vy = (dy / length) * (f.awaken > 0 ? 8.2 : 6.2);
        addTrail(f, 18, 0.42);
        addEffect("dash", {
          x: f.x,
          y: f.y - 48,
          dir: -f.facing,
          color: f.data.accent,
          color2: "#ffffff",

        });

      }

      function startDodge(f) {
        const forward = arguments.length > 1 ? arguments[1] : false;
        if (f.dodgeCd > 0 || f.stun > 0 || f.attack || f.guard || f.skillState || f.ultState) return false;
        if (!spendStamina(f, staminaCost("dodge"))) return false;
        f.dodgeTimer = forward ? 15 : 13;
        f.invuln = forward ? 14 : 15;
        f.dodgeCd = DODGE_CD_FRAMES;

        for (let i = 0; i < count; i += 1) {
          const angle = (i / count) * Math.PI * 2 + rnd(-0.12, 0.12);
          const speed = rnd(2.2, 7.2);
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - rnd(0.4, 1.5),
            life: rnd(24, 52),
            color: colors[i % colors.length],
            size: rnd(2, 6)
          });

        });

        target.lastHitBy = owner;
        addFloatingText(String(finalDamage), target.x, target.y - 96, "#ffb4a6");
        hitSpark(target.x - owner.facing * 14, target.y - 60, color, "heavy", owner.facing);
        if (tryDuoForcedEntry(target)) return;
        checkRoundEnd();
      }

      function shouldCountForceLaunch(kind) {
        return !["dodgeCounter", "roadRoller", "yellowFlashDive", "reaperHand", "wolfBite", "deathPortal", "youthDragon", "dinoBite", "dinoClaw", "wireTrap", "oilExplosion"].includes(kind);
      }

      function triggerForceLaunch(attacker, target, sourceX) {
        const dir = Math.sign(target.x - sourceX) || attacker.facing || 1;
        target.forceLaunchDamage = 0;
        target.forceLaunchTimer = 0;
        target.grabbedTimer = 0;
        target.grabbedBy = null;
        target.guard = false;
        target.attack = null;
        target.skillState = null;
        target.ultState = null;
        target.grounded = false;
        target.vx = dir * 34;
        target.vy = -16.5;
        target.stun = Math.max(target.stun, 82);
        target.comboTimer = 0;
        target.comboHits = 0;
        addFloatingText(language === "zh" ? "保护击飞" : "Combo Break Launch", target.x, target.y - 132, "#f6d46e");
        addEffect("ground-burst", {
          x: target.x,
          y: target.y - 18,
          color: "#f6d46e",
          color2: "#ffffff",
          size: 1.55,
          life: 24
        });
        fireworkBurst(target.x, target.y - 64, ["#f6d46e", "#ffffff", attacker.data.accent], 30);
        addShake(15, 20);
      }

      function hitSpark(x, y, color, kind = "light", dir = 1) {
        const heavy = kind === "heavy";
        burst(x, y, color, heavy ? 30 : 18);
        addEffect("impact", {
          x,
          y,
          dir,
          color,
          color2: heavy ? "#fff1a8" : "#ffffff",
          size: heavy ? 1.35 : 0.95,
          life: heavy ? 18 : 12,
          kind
        });
        addEffect("hit-ring", {
          x,
          y,
          dir,
          color,
          color2: "#ffffff",
          size: heavy ? 1.15 : 0.8,
          life: heavy ? 16 : 11,
          kind
        });
        addShake(heavy ? 7.5 : 4.2, heavy ? 13 : 8);
        hitStops.push(heavy ? 7 : 4);
      }

      function dealDamage(attacker, target, rawDamage, knock, kind, sourceX) {
        if (target.hp <= 0) return false;
        if (target.invuln > 0 && !isFrozenByTimeStop(target)) {
          if (target.dodgeTimer > 0 && attacker !== target) grantDodgeCounter(target, sourceX == null ? attacker.x : sourceX);
          return false;
        }
        let damage = rawDamage * defenseMultiplier(target);
        let bonus = "";
        const cls = attackClass(kind);

        if (target.guard && target.shield > 0) {
          const shieldDamage = Math.round(damage * (cls === "heavy" ? 1.35 : cls === "wave" ? 1.05 : 0.8));
          target.shield = clamp(target.shield - shieldDamage, 0, SHIELD_MAX);
          target.energy = clamp(target.energy + Math.min(7, shieldDamage * 0.16), 0, ENERGY_MAX);
          attacker.energy = clamp(attacker.energy + Math.min(6, shieldDamage * 0.12), 0, ENERGY_MAX);
          guardEffect(target, target.shield <= 0 ? "break" : "guard");
          hitSpark(target.x, target.y - 56, target.shield <= 0 ? "#f6d46e" : "#9ff1b7", target.shield <= 0 ? "heavy" : "light", -attacker.facing);
          if (target.shield <= 0) {
            target.guard = false;
            target.shieldBroken = true;
            target.stun = Math.max(target.stun, SHIELD_BREAK_STUN);
            damage *= 1.38;
            bonus = "破盾";
            playSfx("break");
          } else {
            addFloatingText("防御", target.x, target.y - 88, "#b8f7cb");
            playSfx("guard");
            return true;
          }
        }

        if (target.comboTimer > 0) target.comboHits += 1;
        else target.comboHits = 1;
        target.comboTimer = 90;
        damage *= Math.max(0.5, 1 - (target.comboHits - 1) * 0.08);
        damage = Math.max(1, Math.round(damage));
        target.hp = clamp(target.hp - damage, 0, target.maxHp);
        if (target.dummy) target.hp = target.maxHp;
        const superArmor = (target.skillState && target.skillState.type === "youthFlameRush") || (target.id === 10 && target.youthMode === "red" && target.ultimateHoldTimer > 0) || (target.id === 15 && target.duoMode === "boy" && target.duoMuscleTimer > 0 && target.attack);
        const energyRate = attacker.id === 1 ? 0.62 : attacker.id === 10 ? 1.55 : attacker.id === 11 ? 0.72 : attacker.id === 15 ? 1.05 : 1.15;
        attacker.energy = clamp(attacker.energy + damage * energyRate, 0, ENERGY_MAX);
        if (target.id === 1) target.energy = clamp(target.energy + damage * 0.58, 0, ENERGY_MAX);
        target.hurtFlash = 12;
        attacker.comboFlash = Math.max(attacker.comboFlash, cls === "heavy" ? 22 : 12);
        const baseHitStun = kind === "lowLight" || kind === "light" ? 28 : cls === "heavy" ? 34 : 22;
        target.stun = Math.max(target.stun, baseHitStun);
        const dir = Math.sign(target.x - sourceX) || attacker.facing;
        target.hurtDir = dir;
        target.vx += dir * knock;
        if (cls === "heavy") {
          target.vy -= target.grounded ? 8.2 : 3.8;
          target.grounded = false;
        } else {
          target.vy -= target.grounded ? 1.6 : 0;
        }
        if (superArmor) {
          target.stun = 0;
          target.vx *= 0.25;
          if (target.grounded) target.vy = 0;
          addFloatingText(language === "zh" ? "霸体" : "Armor", target.x, target.y - 118, "#7fd8ff");
        }
        if (kind === "lowHeavy") target.vx += dir * 5;
        if (kind === "airHeavyDown") target.vy += 7;
        if (kind === "airHoming") attacker.vx *= 0.35;
        if (kind === "dodgeCounter") {
          target.vx += dir * 20;
          target.vy = -15.6;
          target.grounded = false;
          target.stun = Math.max(target.stun, 72);
          bonus = bonus || "反击";
          addShake(14, 20);
        }
        if (kind === "fire") applyBurn(target, attacker, 120);
        if (kind === "brainwave") target.stun = Math.max(target.stun, 90);
        if (attacker.id === 5 && attacker.awaken > 0 && ["light", "heavy", "lowLight", "lowHeavy", "airHeavyDown", "airHoming"].includes(kind)) {
          applyBleed(target, attacker, 180);
        }
        if (!superArmor && shouldCountForceLaunch(kind) && target.grabbedTimer <= 0 && target.hp > 0) {
          target.forceLaunchDamage = (target.forceLaunchDamage || 0) + damage;
          target.forceLaunchTimer = FORCE_LAUNCH_WINDOW;
          if (target.forceLaunchDamage >= FORCE_LAUNCH_DAMAGE) {
            triggerForceLaunch(attacker, target, sourceX);
            bonus = bonus || "保护";
          }
        }
        target.lastHitBy = attacker;
        addFloatingText(bonus || String(damage), target.x, target.y - 92, bonus ? "#f6d46e" : "#fff1b8");
        hitSpark(target.x - dir * 15, target.y - 52, attacker.data.accent, cls, dir);
        playSfx(kind === "dodgeCounter" ? "counter" : "hit");
        if (tryDuoForcedEntry(target)) return true;
        checkRoundEnd();
        return true;
      }

      function attackBox(f, attack, xOverride) {
        const box = bodyBox(f, xOverride);
        const stats = attackStats(f, attack.type);
        const range = attack.range || stats.range;
        const low = attack.type === "lowLight" || attack.type === "lowHeavy";
        const air = attack.type === "airHoming" || attack.type === "airHeavyDown";
        const dodge = attack.type === "dodgeCounter";
        const top = low ? box.bottom - 38 : attack.type === "airHeavyDown" ? box.top + 58 : air ? box.top + 8 : dodge ? box.top + 24 : box.top + (f.crouch ? 10 : 15);
        const bottom = low ? box.bottom - 4 : attack.type === "airHeavyDown" ? box.bottom + 70 : air ? box.bottom - 8 : dodge ? box.bottom - 16 : box.bottom - 13;
        if (f.facing > 0) {
          return {
            left: box.right - 4,
            right: box.right + range,
            top,
            bottom
          };
        }
        return {
          left: box.left - range,
          right: box.left + 4,
          top,
          bottom
        };
      }

      function clonePosition(f) {
        if (!f.clone) return null;
        const desiredX = clamp(f.x - f.facing * 64, 70, W - 70);
        f.clone.x += (desiredX - f.clone.x) * 0.18;
        f.clone.y += (f.y - f.clone.y) * 0.18;
        return f.clone;
      }

      function resolveAttack(attacker, target) {
        const attack = attacker.attack;
        if (!attack) return;
        const active = attack.timer >= attack.windup && attack.timer < attack.windup + attack.active;
        if (!active || attack.hasHit) return;
        if (!attack.fxStarted) {
          attack.fxStarted = true;
          slashEffect(attacker, attack.type);
          addTrail(attacker, attack.type === "heavy" ? 11 : 8, attack.type === "heavy" ? 0.28 : 0.18);
        }
        if (overlap(attackBox(attacker, attack), bodyBox(target))) {
          const stats = attackStats(attacker, attack.type);
          attack.hasHit = dealDamage(attacker, target, attack.damage || stats.damage, attack.knock || stats.knock, attack.type, attacker.x);
        }
      }

      function resolveCloneAttack(attacker, target) {
        const attack = attacker.cloneAttack;
        if (!attack || !attacker.clone) return;
        const active = attack.timer >= attack.windup && attack.timer < attack.windup + attack.active;
        if (!active || attack.hasHit) return;
        if (!attack.fxStarted) {
          attack.fxStarted = true;
          addEffect("slash", {
            x: attacker.clone.x + attacker.facing * 44,
            y: attacker.clone.y - 54,
            dir: attacker.facing,
            color: "#c9b6ff",
            color2: "#ffffff",
            size: attack.type === "heavy" ? 1.05 : 0.75,
            life: attack.type === "heavy" ? 15 : 10,
            kind: attack.type
          });
        }
        const cloneX = attacker.clone.x;
        const stats = attackStats(attacker, attack.type, 0.55);
        const box = bodyBox(attacker, cloneX);
        const top = box.top + 20;
        const bottom = box.bottom - 14;
        const range = stats.range * 0.88;
        const hitbox = attacker.facing > 0
          ? { left: box.right - 4, right: box.right + range, top, bottom }
          : { left: box.left - range, right: box.left + 4, top, bottom };
        if (overlap(hitbox, bodyBox(target))) {
          attack.hasHit = dealDamage(attacker, target, stats.damage, stats.knock * 0.7, attack.type, cloneX);
        }
      }

      function spawnWave(f) {
        if (f.projectileCd > 0 || isBusy(f) || f.guard) return false;
        f.projectileCd = 44;
        f.attack = {
          type: "wave-cast",
          timer: 0,
          windup: 3,
          active: 6,
          recovery: 10,
          hasHit: true
        };
        projectiles.push({
          kind: "wave",
          x: f.x + f.facing * 32,
          y: f.y - 58,
          vx: f.facing * 9.8,
          vy: 0,
          owner: f,
          life: 70,
          damage: 8 * attackMultiplier(f),
          knock: 5,
          radius: 18,
          color: f.data.accent,
          hit: false
        });
        burst(f.x + f.facing * 25, f.y - 55, f.data.accent, 8);
        return true;
      }

      function updateProjectiles() {
        for (let i = projectiles.length - 1; i >= 0; i -= 1) {
          const p = projectiles[i];
          if (isFrozenByTimeStop(p.owner)) continue;
          p.timer = (p.timer || 0) + 1;
          const target = p.target && p.target.hp > 0 ? p.target : (p.owner === player ? enemy : player);

          if (p.kind === "duoHand") {
            const owner = p.owner;
            const dir = Math.sign(p.vx) || owner.facing || 1;
            if (p.grabbed && target && target.hp > 0) {
              const pullX = owner.x + owner.facing * 58;
              p.x += (pullX - p.x) * 0.32;
              p.y += (owner.y - 86 - p.y) * 0.28;
              target.grabbedTimer = Math.max(target.grabbedTimer, 4);
              target.grabbedBy = owner;
              target.x = clamp(p.x, 44, W - 44);
              target.y = GROUND;
              target.vx = 0;
              target.vy = 0;
              target.stun = Math.max(target.stun, 8);
              if (Math.abs(target.x - pullX) < 18 || p.life <= 38) {
                target.grabbedTimer = 0;
                target.grabbedBy = null;
                target.stun = Math.max(target.stun, 44);
                target.vx = owner.facing * 8;
                p.returning = true;
                p.grabbed = false;
              }
            } else if (p.returning) {
              const dx = owner.x + owner.facing * 32 - p.x;
              const dy = owner.y - 88 - p.y;
              const len = Math.max(1, Math.hypot(dx, dy));
              p.vx += (dx / len) * 1.15;
              p.vy += (dy / len) * 0.75;
              const speed = 13.5;
              const current = Math.max(1, Math.hypot(p.vx, p.vy));
              p.vx = (p.vx / current) * Math.min(speed, current);
              p.vy = (p.vy / current) * Math.min(speed, current);
              p.x += p.vx;
              p.y += p.vy;
            } else {
              p.x += p.vx;
              p.y += p.vy || 0;
              if (Math.abs(p.x - owner.x) > 250 || p.life < 42) p.returning = true;
              const radius = p.radius || 20;
              const pbox = { left: p.x - radius, right: p.x + radius, top: p.y - radius, bottom: p.y + radius };
              if (!p.hit && target && target.hp > 0 && overlap(pbox, bodyBox(target))) {
                p.hit = dealDamage(owner, target, p.damage, p.knock || 4, "duoHand", p.x);
                if (p.hit) {
                  p.grabbed = true;
                  p.returning = false;
                  target.grabbedTimer = Math.max(target.grabbedTimer, 52);
                  target.grabbedBy = owner;
                  target.attack = null;
                  target.skillState = null;
                  target.ultState = null;
                  target.guard = false;

                  playSfx("counter");
                }
              }
            }
            p.life -= 1;
            if (frame % 3 === 0) {
              addEffect("aura-chip", {
                x: p.x + rnd(-12, 12),

                vx: rnd(-0.5, 0.5),
                vy: rnd(-0.5, 0.4),
                color: choice(["#36ff8b", "#ffffff", "#7fd8ff"]),
                size: rnd(2, 5),
                life: 12
              });
            }
            if (p.life <= 0 || (p.returning && Math.hypot((owner.x + owner.facing * 32) - p.x, (owner.y - 88) - p.y) < 24)) {
              projectiles.splice(i, 1);
            }
            continue;
          }

          if (p.kind === "duoNukeBomb") {
            p.y += p.vy;
            p.life -= 1;
            if (frame % 2 === 0) {
              addEffect("aura-chip", {
                x: p.x + rnd(-26, 26),
                y: p.y + rnd(-20, 24),
                vx: rnd(-0.7, 0.7),
                vy: rnd(-0.4, 1.4),
                color: choice(["#36ff8b", "#ffffff", "#7fd8ff"]),
                size: rnd(4, 9),
                life: 18

            }
            if (p.y >= GROUND - 68 || p.life <= 0) {
              explodeAt(p.owner, p.x, GROUND - 72, p.blastRadius || 168, p.damage, "duoNuke", {
                color: "#36ff8b",
                color2: "#ffffff",
                knock: p.knock || 22,
                stun: 34,
                shake: 24,
                flash: 0.62,
                life: 44
              });
              fireworkBurst(p.x, GROUND - 84, ["#36ff8b", "#ffffff", "#7fd8ff", "#ffcf64"], 96);
              projectiles.splice(i, 1);
            }
            continue;
          }

          if (p.kind === "meteor") {
            p.y += p.vy;
            p.life -= 1;
            addEffect("aura-chip", {
              x: p.x + rnd(-24, 24),
              y: p.y + rnd(-18, 18),
              vx: rnd(-0.6, 0.6),
              vy: rnd(-0.4, 1.2),
              color: p.color,
              size: rnd(3, 7),
              life: 18
            });
            if (p.y >= GROUND - 12 || p.life <= 0) {
              explodeAt(p.owner, p.x, GROUND - 62, p.radius, p.damage, "meteor", {
                color: p.color,
                color2: p.color2,
                stun: 26,
                shake: 18,
                flash: 0.38
              });
              projectiles.splice(i, 1);
            }
            continue;
          }

          if (p.kind === "bomb") {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.22;
            if (p.y > GROUND - 18) {
              p.y = GROUND - 18;
              p.vx *= 0.88;
              p.vy *= -0.18;
            }
            p.explodeTimer -= 1;
            p.life -= 1;
            if (frame % 4 === 0) {
              addEffect("aura-chip", {
                x: p.x + rnd(-8, 8),
                y: p.y - 8,
                vx: rnd(-0.4, 0.4),
                vy: rnd(-1.2, -0.2),
                color: p.color,
                size: rnd(2, 5),

              });
            }
            if (p.explodeTimer <= 0 || p.life <= 0) {
              explodeAt(p.owner, p.x, p.y - 18, p.radius, p.damage, "bomb", {
                color: p.color2,
                color2: "#fff1a8",
                shake: 14,
                flash: 0.32
              });
              projectiles.splice(i, 1);
            }

          }

          if (p.kind === "missile") {
            if (target) {

            p.x += p.vx;
            p.y += p.vy;
            p.life -= 1;
            addEffect("aura-chip", {
              x: p.x - Math.sign(p.vx || 1) * rnd(12, 26),

            if ((target && overlap(pbox, bodyBox(target))) || p.y >= GROUND - 18 || p.life <= 0) {

                shake: 15,

              });

          if (p.homing && target) {

            const len = Math.max(1, Math.hypot(dx, dy));

            p.vy += (dy / len) * p.homing * 0.72;
            const speed = p.kind === "swordBeam" ? 11.5 : 9;
            const current = Math.max(1, Math.hypot(p.vx, p.vy));

            p.vy = (p.vy / current) * Math.min(speed * 0.75, current);

          if (p.kind === "deathPortal") {

              if (inTrap || p.hit) {

                target.grabbedTimer = Math.max(target.grabbedTimer, (p.executing ? p.executeTimer : Math.min(p.life, p.grabLife || 120)) + 2);

                if (p.executing && frame % 2 === 0) {

                  });

                  target.hp = 0;

                  addShake(22, 32);
                  screenFlash = Math.max(screenFlash, 0.55);

                  checkRoundEnd();
                  projectiles.splice(i, 1);

              if (frame % 3 === 0) {
                addEffect("aura-chip", {
                  x: p.x + rnd(-p.radius, p.radius),
                  y: GROUND - rnd(8, 136),

      function applyInput(f, input, other) {

          f.attack = null;
          f.skillState = null;
          f.ultState = null;
          if (f.reverseTimer > 0) {
            f.vx *= 0.72;
            f.stun = Math.max(f.stun, 2);
          }
          if (f.agedTimer > 0) {
            f.vx *= 0.86;
            f.stun = Math.max(f.stun, 2);
          }
        }
        const hardDisabled = f.reverseTimer > 0 || f.agedTimer > 0;
        if (f.grabbedTimer > 0) {
          f.guard = false;
          f.crouch = false;
          f.attack = null;
          return;
        }
        if (!hardDisabled && input.awaken) {
          if (f.id === 15) startDuoSwitch(f);
          else startAwaken(f);
        }
        if (!hardDisabled && f.id === 10 && f.awaken > 0 && f.youthMode === "red") {
          if (input.ultimate && input.ultimateHold === undefined && input.ultimateRelease === undefined) startUltimate(f, other);
          if (input.ultimateHold && !f.ultState && !f.skillState) {
            f.ultimateHoldTimer = clamp(f.ultimateHoldTimer + 1, 0, 210);
            f.invuln = Math.max(f.invuln, 2);
            f.stun = 0;
            f.vx *= 0.82;
            if (frame % 5 === 0) {
              addEffect("aura-chip", {
                x: f.x + rnd(-24, 24),
                y: f.y - rnd(50, 138),
                vx: rnd(-0.5, 0.5),
                vy: rnd(-1.5, -0.2),
                color: f.ultimateHoldTimer >= 180 ? "#ffffff" : "#ff3c4e",
                size: rnd(3, 7),
                life: 18
              });
            }
          }
          if (input.ultimateRelease && f.ultimateHoldTimer > 0) startUltimate(f, other);
        } else if (!hardDisabled && input.ultimate) {
          startUltimate(f, other);
        }
        if (!hardDisabled && input.special) startSpecial(f, other);
        if (!hardDisabled && input.skill) startSkill(f, other);
        if (!hardDisabled && input.dodge) {
          const forward = (f.facing > 0 && input.right) || (f.facing < 0 && input.left);
          startDodge(f, forward);
        }
        if (!hardDisabled && input.light && f.dodgeCounterWindow > 0) {
          if (startDodgeCounter(f, other)) return;
        }
        const canMove = (f.agedTimer > 0 || f.stun <= 0) && f.reverseTimer <= 0 && f.dodgeTimer <= 0 && !f.skillState && !f.ultState && (!f.attack || f.attack.timer > f.attack.windup + f.attack.active);
        f.guard = false;
        f.crouch = false;

        if (!hardDisabled && f.stun <= 0 && f.dodgeTimer <= 0 && !f.attack && !f.skillState && !f.ultState) {
          f.crouch = input.crouch && f.grounded;
          f.guard = input.guard && f.grounded && f.shield > 0;
          if (f.id === 4 && input.heavyHold && !f.guard) {
            f.chargeTimer = clamp(f.chargeTimer + 1, 0, 120);
            f.vx *= 0.72;
            if (frame % 4 === 0) {
              addEffect("aura-chip", {
                x: f.x + f.facing * 38,
                y: f.y - 72,
                vx: f.facing * rnd(0.3, 0.9),
                vy: rnd(-0.5, 0.4),
                color: "#b777ff",
                size: rnd(3, 7),
                life: 18
              });
            }
          } else if (f.id === 4 && f.chargeTimer > 0 && (input.heavyRelease || !input.heavyHold)) {
            releaseTwinLaser(f, other);
          }
          if (f.id === 15 && f.duoMode === "scientist" && f.awaken > 0 && f.duoRocketTimer > 0 && input.jumpHold && f.stamina > 0) {
            spendStamina(f, 0.42);
            f.grounded = false;
            f.vy = clamp(f.vy - 0.9, -7.6, 9.5);
            if (frame % 3 === 0) {
              addEffect("dust", {
                x: f.x - f.facing * 18,
                y: f.y - 54,
                vx: -f.facing * rnd(0.4, 1.4),
                vy: rnd(0.4, 1.4),
                color: choice(["#ff6c4c", "#36ff8b", "#ffffff"]),
                size: rnd(3, 7),
                life: 14
              });
            }
          }
          const firingMachineGun = f.id === 6 && f.awaken > 0 && input.lightHold && fireMachineGun(f, other);
          const rushingStand = !firingMachineGun && (f.id === 7 || f.id === 11 || f.id === 14) && f.awaken > 0 && input.lightHold && standRushPunch(f, other);
          const duoRocketShot = !firingMachineGun && !rushingStand && f.id === 15 && f.duoMode === "scientist" && f.awaken > 0 && input.light && fireDuoHomingLaser(f, other);
          if (firingMachineGun || rushingStand || duoRocketShot) {
            f.crouch = false;

            if (f.id === 3 && !f.grounded) {
              if (f.awaken > 0 && !f.airLightUsed) spawnAwakenAirShuriken(f, other);
            } else if (f.crouch) {
              startAttack(f, "lowLight");
            } else {
              startAttack(f, "light");

          } else if (input.heavy) {
            if (f.id === 2 && !f.grounded) startAttack(f, "airHeavyDown");
            else if (f.id !== 4 || f.chargeTimer <= 0) startAttack(f, f.crouch ? "lowHeavy" : "heavy");
          }
        }

        if (!hardDisabled && input.jump && f.jumpsLeft > 0 && f.stun <= 0 && f.dodgeTimer <= 0 && !f.guard && !f.skillState && !f.ultState) {

        if (canMove && !f.guard) {
          const speed = moveSpeed(f);
          if (input.left) f.vx -= speed * 0.28;
          if (input.right) f.vx += speed * 0.28;
        }

      function updateAI(f, target) {
        const diff = difficulties[f.diffKey];
        const hell = f.diffKey === "hell";
        const intent = f.aiIntent;
        intent.left = false;
        intent.right = false;
        intent.jump = false;
        intent.crouch = false;
        intent.light = false;
        intent.lightHold = false;
        intent.heavy = false;
        intent.guard = false;
        intent.dodge = false;
        intent.awaken = false;
        intent.skill = false;
        intent.ultimate = false;
        intent.special = false;

        if (f.dummy || gameMode === "training") return intent;
        if (f.hp <= 0 || state !== "fight") return intent;
        const distance = Math.abs(target.x - f.x);
        const targetDir = target.x > f.x ? 1 : -1;
        const range = attackStats(f, "light").range + fighterWidth(f) / 2 + 22;
        const danger = target.attack && distance < attackStats(target, target.attack.type === "heavy" ? "heavy" : "light").range + (hell ? 92 : 65);

        if (hell && f.dodgeCounterWindow > 0) {
          intent.light = true;
          return intent;
        }

        if (f.energy >= ENERGY_MAX && f.awaken <= 0 && Math.random() < diff.awaken / 90) {
          intent.awaken = true;
        }

        if (f.awaken > 0 && Math.random() < diff.attack / (hell ? 95 : 180)) {
          intent.ultimate = true;
        }

        if (danger && f.stun <= 0 && !f.attack) {
          if (hell && f.dodgeCd <= 0 && f.stamina > 22 && Math.random() < 0.5) {
            if (targetDir < 0) intent.left = true;
            else intent.right = true;
            intent.dodge = true;
          } else if (f.id === 2 && f.skillCd <= 0 && Math.random() < diff.guard * 0.7) {
            intent.skill = true;
          } else if (target.attack.type === "heavy" && Math.random() < diff.attack * 0.52 && distance < range) {
            intent.light = true;
          } else if (Math.random() < diff.guard) {
            intent.guard = true;
          } else if (Math.random() < diff.dodge) {
            intent.dodge = true;
          }
        }

        if (!intent.guard && !intent.dodge && !intent.light) {
          if (distance > range) {
            if (targetDir < 0) intent.left = true;
            else intent.right = true;
            if (f.skillCd <= 0 && Math.random() < diff.attack / (hell ? 42 : 80)) intent.skill = true;
            if (hell && f.dodgeCd <= 0 && f.stamina > 36 && distance > 160 && distance < 330 && Math.random() < 0.08) intent.dodge = true;
            if (!f.grounded && f.id === 3 && f.awaken > 0 && Math.random() < (hell ? 0.055 : 0.02)) intent.light = true;
          } else if (distance < (hell ? 58 : 42) && Math.random() < (hell ? 0.48 : 0.35)) {
            if (targetDir < 0) intent.right = true;
            else intent.left = true;
          }
        }

        f.aiThink -= 1;
        if (f.aiThink <= 0) {
          f.aiThink = diff.think + Math.floor(rnd(0, diff.think * 0.55));
          if (distance < range && !danger && f.stun <= 0 && !f.attack) {
            const seesGuard = target.guard;
            if (f.skillCd <= 0 && Math.random() < (hell ? 0.32 : 0.16) + diff.attack * 0.18) intent.skill = true;
            if (Math.random() < (hell ? 0.4 : 0.22) + diff.attack * 0.12) intent.crouch = true;
            if (seesGuard || Math.random() < (hell ? 0.58 : 0.42)) intent.heavy = Math.random() < diff.attack;
            else intent.light = Math.random() < diff.attack;
          }
          if (f.id === 3 && f.awaken > 0 && distance > 150 && Math.random() < (hell ? 0.52 : 0.38)) {
            intent.jump = true;
          }
        }

        if (hell && !danger && f.stun <= 0 && !f.attack && distance < range + 24 && Math.random() < 0.18) {
          intent.light = Math.random() < 0.58;
          intent.heavy = !intent.light;
        }

        if (target.guard && distance < range && Math.random() < diff.attack / (hell ? 18 : 30)) {
          intent.heavy = true;
        }

        if (f.id === 6 && f.awaken > 0 && f.stamina > 24 && distance > 92 && distance < 360 && Math.random() < diff.attack * 0.34) {
          intent.lightHold = true;
        }
        if (f.id === 7 && f.awaken > 0 && f.stamina > 28 && distance > 58 && distance < 178 && Math.random() < diff.attack * 0.36) {
          intent.lightHold = true;
        }
        if (f.id === 11 && f.awaken > 0 && f.stamina > 28 && distance > 62 && distance < 190 && Math.random() < diff.attack * 0.36) {
          intent.lightHold = true;
        }
        if (f.id === 8 && f.awaken > 0 && f.stamina > 32 && distance > 80 && distance < 310 && f.flashOrbCd <= 0 && Math.random() < diff.attack * 0.3) {
          intent.special = true;
        }
        if (f.id === 9 && f.awaken > 0 && f.specialCd <= 0 && distance < 320 && Math.random() < diff.attack * 0.18) {
          intent.special = true;
        }
        if (f.id === 11 && f.specialCd <= 0 && f.crawlTimer <= 0 && distance > 110 && distance < 420 && Math.random() < diff.attack * 0.16) {
          intent.special = true;
        }
        if (f.id === 12 && f.specialCd <= 0 && distance > 120 && distance < 430 && Math.random() < diff.attack * 0.18) {
          intent.special = true;
        }
        if (f.id === 10 && f.skillCd <= 0 && distance > 72 && distance < 260 && Math.random() < diff.attack * 0.18) {
          intent.skill = true;
        }
        if (hell && f.awaken > 0 && distance < 360 && Math.random() < 0.012) {
          intent.ultimate = true;
        }

        return intent;
      }

      function updateSkillState(f, other) {
        if (!f.skillState) return;
        const s = f.skillState;
        s.timer -= 1;
        if (s.type === "duoSwitch" || s.type === "duoForcedEntry") {
          f.vx *= 0.28;
          f.guard = false;
          f.crouch = false;
          f.attack = null;
          if (frame % 2 === 0) {
            addEffect("aura-chip", {
              x: f.x - f.facing * rnd(18, 58),
              y: f.y - rnd(32, 160),
              vx: -f.facing * rnd(0.2, 1.2),

              life: 14
            });
          }
          if (s.type === "duoSwitch" && !s.switched && s.timer <= 22) {
            s.switched = true;
            saveDuoActiveHp(f);
            setDuoMode(f, s.to || duoOtherMode(f), false);
            f.vx = f.facing * 1.6;

      function updateCloneAI(owner, target) {
        const c = owner.clone;
        if (!c || owner.awaken <= 0 || owner.hp <= 0 || target.hp <= 0 || c.hp <= 0) return;
        c.y = GROUND;
        c.hurtFlash = Math.max(0, (c.hurtFlash || 0) - 1);
        c.facing = target.x >= c.x ? 1 : -1;
        const dist = Math.abs(target.x - c.x);
        if (!c.attack) {
          if (dist > 96) c.vx += c.facing * 0.42;
          else if (dist < 54) c.vx -= c.facing * 0.32;
        }
        c.x = clamp(c.x + c.vx, 48, W - 48);
        c.vx *= 0.82;
        c.cooldown = Math.max(0, c.cooldown - 1);

        if (c.attack) {
          c.attack.timer += 1;
          const active = c.attack.timer >= c.attack.windup && c.attack.timer < c.attack.windup + c.attack.active;
          if (active && !c.attack.hasHit) {
            const hitbox = c.facing > 0
              ? { left: c.x + 12, right: c.x + 88, top: c.y - 102, bottom: c.y - 20 }
              : { left: c.x - 88, right: c.x - 12, top: c.y - 102, bottom: c.y - 20 };
            if (overlap(hitbox, bodyBox(target))) {
              c.attack.hasHit = dealDamage(owner, target, attackStats(owner, "light").damage * 0.3, 4, "light", c.x);
            }
          }
          if (c.attack.timer > c.attack.windup + c.attack.active + c.attack.recovery) {
            c.attack = null;
          }
        } else if (c.cooldown <= 0 && dist < 118) {
          c.attack = { type: "light", timer: 0, windup: 7, active: 10, recovery: 18, hasHit: false };
          c.cooldown = 46;
          addEffect("slash", {
            x: c.x + c.facing * 42,
            y: c.y - 58,
            dir: c.facing,
            color: "#b777ff",
            color2: "#ffffff",
            size: 0.82,
            life: 12,
            kind: "light"
          });
        }
      }

      function updateReaperGhosts(owner, target) {
        if (!owner || owner.id !== 9 || !owner.ghosts || !owner.ghosts.length || owner.hp <= 0) return;
        for (let i = owner.ghosts.length - 1; i >= 0; i -= 1) {
          const g = owner.ghosts[i];
          g.life -= 1;
          if (!target || target.hp <= 0 || owner.awaken <= 0 || g.life <= 0) {
            owner.ghosts.splice(i, 1);
            continue;
          }
          const desiredX = clamp(target.x - Math.sign(target.x - g.x || owner.facing) * 54 + Math.sin((frame + i * 37) / 16) * 24, 42, W - 42);
          const desiredY = target.y - 74 - i * 18 + Math.sin((frame + g.phase * 20) / 12) * 18;
          g.x += (desiredX - g.x) * 0.13;
          g.y += (desiredY - g.y) * 0.11;
          g.facing = target.x >= g.x ? 1 : -1;
          g.cooldown = Math.max(0, g.cooldown - 1);
          if (frame % 4 === 0) {
            addEffect("aura-chip", {
              x: g.x + rnd(-16, 16),
              y: g.y + rnd(-20, 20),
              vx: rnd(-0.4, 0.4),
              vy: rnd(-0.8, 0.2),
              color: choice(["#b777ff", "#ffffff", "#151016"]),
              size: rnd(2, 5),
              life: 14
            });
          }
          const close = Math.abs(target.x - g.x) < 118 && Math.abs((target.y - 72) - g.y) < 96;
          if (close && g.cooldown <= 0) {
            g.cooldown = 30 + i * 4;
            let hit = false;
            if (target.invuln <= 0 || isFrozenByTimeStop(target)) {
              const damage = Math.max(1, Math.round(2.2 * attackMultiplier(owner) * defenseMultiplier(target)));
              target.hp = clamp(target.hp - damage, 0, target.maxHp);
              if (target.dummy) target.hp = target.maxHp;
              target.hurtFlash = Math.max(target.hurtFlash, 6);
              target.lastHitBy = owner;
              owner.energy = clamp(owner.energy + damage * 0.25, 0, ENERGY_MAX);
              addFloatingText(String(damage), target.x, target.y - 104, "#d7cdfb");
              hit = true;
              checkRoundEnd();
            }
            addEffect("slash", {
              x: g.x + g.facing * 44,
              y: g.y,
              dir: g.facing,
              color: "#b777ff",
              color2: "#ffffff",
              size: 1.05,
              life: 12,
              kind: "ghostSlash"
            });
            if (hit && frame % 12 === 0) playSfx("reaperGhost");
          }
        }
      }

      function resolveCloneHit(attacker, cloneOwner) {
        if (!cloneOwner.clone || !attacker.attack) return;
        const attack = attacker.attack;
        const active = attack.timer >= attack.windup && attack.timer < attack.windup + attack.active;
        if (!active || attack.hitClone) return;
        const c = cloneOwner.clone;
        const box = { left: c.x - 32, right: c.x + 32, top: c.y - 138, bottom: c.y };
        if (overlap(attackBox(attacker, attack), box)) {
          attack.hitClone = true;
          const stats = attackStats(attacker, attack.type);
          const damage = Math.max(4, Math.round(stats.damage * 0.65));
          c.hp = clamp(c.hp - damage, 0, c.maxHp);
          c.hurtFlash = 12;
          c.vx += attacker.facing * 3.5;
          attacker.energy = clamp(attacker.energy + damage * 0.35, 0, ENERGY_MAX);
          addFloatingText(String(damage), c.x, c.y - 126, "#d7cdfb");
          burst(c.x, c.y - 70, "#b777ff", 12);
          if (c.hp <= 0) {
            cloneOwner.clone = null;
            burst(c.x, c.y - 70, "#b777ff", 28);
            addFloatingText("分身击破", c.x, c.y - 106, "#f6d46e");
          }
          playSfx("hit");
        }
      }

              color: "#bcae92",
              size: rnd(2, 5),
              life: 18
            });
          }
        } else {
          f.walkCycle += 0.05;
        }

        if (f.attack) {
          if (f.attack.type === "dodgeCounter") {
            f.invuln = Math.max(f.invuln, 2);
            f.stun = 0;
            f.vx += f.facing * 0.42;
          }
          f.attack.timer += 1;
          if (f.attack.timer > f.attack.windup + f.attack.active + f.attack.recovery) {
            f.attack = null;
          }
        }
        if (f.cloneAttack) {
          f.cloneAttack.timer += 1;
          if (f.cloneAttack.timer > f.cloneAttack.windup + f.cloneAttack.active + f.cloneAttack.recovery) {
            f.cloneAttack = null;
          }
        }

        if (f.dodgeTimer > 0) {
          const dir = Math.sign(f.vx) || -f.facing;
          f.vx = dir * (5.6 + f.dodgeTimer * 0.2);
          if (frame % 2 === 0) addTrail(f, 16, 0.42);
        }

        if (f.attack && f.attack.type === "airHoming" && f.attack.target && f.attack.timer >= f.attack.windup) {
          const target = f.attack.target;
          const dx = target.x - f.x;
          const dy = target.y - 58 - (f.y - 52);
          const length = Math.max(1, Math.hypot(dx, dy));
          const speed = f.awaken > 0 ? 14.4 : 11.8;
          f.vx += (dx / length) * 1.35;
          f.vy += (dy / length) * 0.85;
          const current = Math.max(1, Math.hypot(f.vx, f.vy));
          f.vx = (f.vx / current) * Math.min(speed, current);
          f.vy = (f.vy / current) * Math.min(speed * 0.75, current);
          if (frame % 2 === 0) addTrail(f, 15, f.awaken > 0 ? 0.48 : 0.36);
          addEffect("aura-chip", {
            x: f.x - f.facing * rnd(8, 28),
            y: f.y - rnd(36, 70),
            vx: -f.facing * rnd(0.5, 1.4),
            vy: rnd(-0.8, 0.5),
            color: f.data.accent,
            size: rnd(2, 5),
            life: 14
          });
        }

        if (f.attack && f.attack.type === "airHeavyDown" && f.attack.timer >= f.attack.windup) {
          f.vy += 1.05;
          f.vx += f.facing * 0.32;
          if (frame % 2 === 0) {
            addEffect("slash", {
              x: f.x + f.facing * 58,
              y: f.y - 22,
              dir: f.facing,
              color: "#9fd7ff",
              color2: "#ffffff",
              size: f.awaken > 0 ? 1.45 : 1.05,
              life: 10,
              kind: "heavy"
            });
          }
        }

        if (f.awaken > 0 && frame % (f.id === 3 ? 3 : 5) === 0) {
          if (Math.abs(f.vx) > 1.2 || !f.grounded || f.awakenIntro > 0) {
            addTrail(f, f.id === 3 ? 15 : 10, f.id === 3 ? 0.36 : 0.22);
          }
          addEffect("aura-chip", {
            x: f.x + rnd(-fighterWidth(f) / 2, fighterWidth(f) / 2),
            y: f.y - rnd(18, fighterHeight(f) + 12),
            vx: rnd(-0.6, 0.6),
            vy: rnd(-1.6, -0.2),
            color: f.data.accent,
            size: rnd(2, 5),
            life: rnd(16, 28)
          });
        }

        f.vy += GRAVITY;
        f.x += f.vx;
        f.y += f.vy;
        f.vx *= f.grounded ? 0.78 : 0.91;

        if (f.y >= GROUND) {
          const landSpeed = Math.abs(f.vy);
          f.y = GROUND;
          f.vy = 0;
          if (!f.grounded) {
            f.landing = 9;
            burst(f.x, f.y - 2, "#8b7b60", 8);
            addEffect("ground-burst", {
              x: f.x,
              y: f.y - 2,
              color: "#bcae92",
              color2: f.data.accent,
              size: Math.min(1.25, landSpeed / 12 + 0.7),
              life: 20
            });
            if (f.pendingSlam && f.pendingSlam.owner && f.pendingSlam.owner.hp > 0) {
              maulDamage(f.pendingSlam.owner, f, f.pendingSlam.damage || 12, f.pendingSlam.color || "#7fd8ff");
              addEffect("ground-burst", {
                x: f.x,
                y: GROUND - 3,
                color: f.pendingSlam.color || "#7fd8ff",
                color2: "#ffffff",
                size: 1.5,
                life: 24
              });
              addShake(13, 18);
              f.pendingSlam = null;
            }
          }
          f.grounded = true;
          f.jumpsLeft = jumpsAllowed(f);
          f.airLightUsed = false;
        } else {
          f.grounded = false;
        }

        f.x = clamp(f.x, 42, W - 42);

      function updateEffects() {
        for (let i = effects.length - 1; i >= 0; i -= 1) {
          const e = effects[i];
          if (e.owner) {
            e.x = e.owner.x;
            e.y = e.owner.y - 54;
          }
          e.x += e.vx;
          e.y += e.vy;
          e.vy += e.type === "dust" ? 0.06 : 0;
          e.rot += 0.08 * e.dir;
          e.life -= 1;
          if (e.life <= 0) effects.splice(i, 1);
        }

        for (let i = trails.length - 1; i >= 0; i -= 1) {
          trails[i].life -= 1;
          trails[i].fighter.x -= trails[i].fighter.facing * 0.25;
          if (trails[i].life <= 0) trails.splice(i, 1);
        }

        if (shakeTime > 0) {
          shakeTime -= 1;
          shakePower *= 0.88;
        } else {
          shakePower *= 0.8;
        }
        if (shakePower < 0.08) shakePower = 0;
        screenFlash = Math.max(0, screenFlash - 0.025);
      }

      function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i -= 1) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += p.text ? 0.02 : 0.12;
          p.life -= 1;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      function checkRoundEnd() {
        if (!player || !enemy || state !== "fight") return;
        if (gameMode === "training") return;
        if (player.hp <= 0 && tryDuoForcedEntry(player)) return;
        if (enemy.hp <= 0 && tryDuoForcedEntry(enemy)) return;
        if (player.hp <= 0 || enemy.hp <= 0) {
          state = "over";
          if (player.hp <= 0 && enemy.hp <= 0) {
            roundMessage = language === "zh" ? "平局" : "Draw";
          } else {
            roundMessage = gameMode === "pvp"
              ? (player.hp > enemy.hp ? t("p1Win") : t("p2Win"))
              : (player.hp > enemy.hp ? t("victory") : t("defeat"));
          }
          playSfx("ko");
          setTimeout(() => showGameOver(), 450);
        }
      }

      function gameStep() {
        frame += 1;
        if (state === "fight" && player && enemy) {
          if (hitStops.length) {
            hitStops[0] -= 1;
            if (hitStops[0] <= 0) hitStops.shift();
            updateEffects();
            updateParticles();
            return;
          }
          if (timeStopActive()) {
            timeStop.timer -= 1;
            if (timeStop.timer <= 0) {
              const owner = timeStop.owner;
              const shouldEndAwaken = timeStop.endAwaken;
              timeStop = null;
              if (owner && shouldEndAwaken) endAwaken(owner);
              screenFlash = Math.max(screenFlash, 0.24);
              addShake(7, 14);
              playSfx("counter");
            }
          } else {
            timeStop = null;
          }
          if (!isFrozenByTimeStop(player)) {
            applyInput(player, readPlayerInput(), enemy);
          }
          if (!isFrozenByTimeStop(enemy)) {
            applyInput(enemy, gameMode === "pvp" ? readPlayerTwoInput() : updateAI(enemy, player), player);
          }
          updateFighter(player, enemy);
          updateFighter(enemy, player);
          if (!isFrozenByTimeStop(player)) updateCloneAI(player, enemy);
          if (!isFrozenByTimeStop(enemy)) updateCloneAI(enemy, player);
          if (!isFrozenByTimeStop(player)) updateReaperGhosts(player, enemy);
          if (!isFrozenByTimeStop(enemy)) updateReaperGhosts(enemy, player);
          if (!timeStopActive()) separateFighters(player, enemy);
          if (!isFrozenByTimeStop(player)) resolveAttack(player, enemy);
          if (!isFrozenByTimeStop(enemy)) resolveAttack(enemy, player);
          if (!isFrozenByTimeStop(player)) resolveCloneHit(player, enemy);
          if (!isFrozenByTimeStop(enemy)) resolveCloneHit(enemy, player);
          updateProjectiles();
        }
        updateEffects();
        updateParticles();
      }

      function attackPose(f) {
        const attack = f.attack;
        if (!attack) {
          return { stage: "idle", p: 0, active: false, heavy: false, recoil: 0 };
        }
        const activeStart = attack.windup;
        const activeEnd = attack.windup + attack.active;
        const total = activeEnd + attack.recovery;
        let stage = "windup";
        let p = clamp(attack.timer / Math.max(1, attack.windup), 0, 1);
        if (attack.timer >= activeStart && attack.timer < activeEnd) {
          stage = "active";
          p = clamp((attack.timer - activeStart) / Math.max(1, attack.active), 0, 1);
        } else if (attack.timer >= activeEnd) {
          stage = "recovery";
          p = clamp((attack.timer - activeEnd) / Math.max(1, attack.recovery), 0, 1);
        }
        return {
          stage,
          p,
          active: stage === "active",
          heavy: attack.type === "heavy",
          recoil: clamp((total - attack.timer) / Math.max(1, attack.recovery), 0, 1)
        };
      }

      function spritePoseFor(f) {

            drawRect(-28, headY - 2, 15, 27, "#2a1f20");
            drawRect(13, headY + 1, 12, 20, "#2a1f20");
            drawRect(-31, headY + 23, 62, 7, "#8a593b");
            drawRect(-3, headY - 17, 30, 8, "#b8a07a");
            drawRect(20, headY - 14, 8, 13, "#d8c7a0");
          } else {
            drawRect(-38, headY - 23, 18, 28, "#ff5a4e");
            drawRect(20, headY - 23, 18, 28, "#ff5a4e");
            drawRect(-45, headY + 28, 90, 8, "#7c1018");
          }
        }

        if (stunned) {
          ctx.scale(1 / dir, 1);
          drawRect(-19, -166, 10, 5, "#f6d46e");
          drawRect(8, -171, 10, 5, "#f6d46e");
        }

        ctx.restore();

        if (f.awaken > 0 && !ghost) {
          ctx.globalAlpha = 0.22 + Math.sin(frame / 6) * 0.08;
          ctx.strokeStyle = f.id === 1 ? "#ffcf64" : f.data.accent;
          ctx.lineWidth = f.awakenIntro > 0 ? 6 : 4;
          const pulse = f.awakenIntro > 0 ? Math.sin(f.awakenIntro * 0.45) * 9 : Math.sin(frame / 8) * 3;
          ctx.strokeRect(px(x - fighterWidth(f) / 2 - 12 - pulse), px(f.y - fighterHeight(f) - 15 - pulse), px(fighterWidth(f) + 24 + pulse * 2), px(fighterHeight(f) + 21 + pulse * 2));

      function drawAttackDebug(f) {
        if (!f || !f.attack || f.attack.type === "wave-cast") return;
        const attack = f.attack;
        const active = attack.timer >= attack.windup && attack.timer < attack.windup + attack.active;
        if (!active) return;
        const stats = attackStats(f, attack.type);
        const cls = attackClass(attack.type);
        const low = attack.type === "lowLight" || attack.type === "lowHeavy";
        const length = (attack.range || stats.range) * (cls === "heavy" ? 0.92 : 0.62);
        const y = f.y - (low ? 27 : attack.type === "airHoming" ? 58 : cls === "heavy" ? 62 : 54);
        ctx.globalAlpha = cls === "heavy" ? 0.22 : 0.14;
        ctx.fillStyle = cls === "heavy" ? "#fff1a8" : f.data.accent;
        for (let i = 0; i < 5; i += 1) {
          const w = length - i * 14;
          const h = cls === "heavy" ? 5 : 3;
          ctx.fillRect(px(f.x + f.facing * (fighterWidth(f) / 2 + 14 + i * 7)), px(y + i * 6), px(f.facing * w), h);
        }
        ctx.globalAlpha = 1;
      }

      function drawTrails() {
        for (const t of trails) {
          const alpha = t.alpha * clamp(t.life / t.maxLife, 0, 1);
          drawFighter(t.fighter, true, t.fighter.x, alpha);
        }
      }

      function drawFighterTimed(f) {
        if (isFrozenByTimeStop(f)) {
          ctx.save();
          ctx.filter = "grayscale(1) contrast(1.12) brightness(0.82)";
          drawFighter(f);
          ctx.restore();
          return;
        }
        drawFighter(f);
      }

      function drawCloneTimed(owner) {
        if (isFrozenByTimeStop(owner)) {
          ctx.save();
          ctx.filter = "grayscale(1) contrast(1.12) brightness(0.82)";
          drawClone(owner);
          ctx.restore();
          return;
        }
        drawClone(owner);
      }

      function drawEffects() {
        for (const e of effects) {
          const p = 1 - clamp(e.life / e.maxLife, 0, 1);

          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(px(e.x), px(e.y));

            ctx.fillRect(px(-8), px(6), px(18 + p * 16), 5);

            ctx.fillRect(px(8), px(-2), px(7 + p * 12), 7);

          } else if (e.type === "ground-burst") {

            ctx.fillStyle = e.color;
            ctx.fillRect(px(-24), px(-43), px(140 * extend + 10), px(22));

            ctx.fillRect(px(40 + grip * 18), px(-118 + grip * 44), px(19), px(76));

            ctx.fillRect(px(36 + grip * 16), px(-122 + grip * 44), px(25), px(9));

            ctx.fillRect(px(42), px(-52), px(94), px(50));
            ctx.fillRect(px(56), px(-75), px(66), px(26));
            ctx.fillStyle = "#111016";
            ctx.fillRect(px(62), px(-62), px(17), px(11));

            ctx.fillRect(px(65), px(-61), px(10), px(8));
            ctx.fillRect(px(101), px(-61), px(10), px(8));
            ctx.fillStyle = "#22111a";
            ctx.fillRect(px(78), px(-34), px(34), px(8));
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(px(52), px(-10), px(78), px(8));
            ctx.fillStyle = "#151016";
            for (let i = 0; i < 6; i += 1) ctx.fillRect(px(58 + i * 12), px(-10), px(5), px(10));
          } else if (e.type === "warning") {
            ctx.strokeStyle = e.color;
            ctx.lineWidth = 4;
            ctx.strokeRect(px(-42 - p * 34), px(-7), px(84 + p * 68), px(12));
            ctx.fillStyle = "rgba(255,255,255,0.45)";
            ctx.fillRect(px(-6), px(-74 + p * 34), 12, px(68 - p * 28));

            ctx.fillRect(px(-28), px(-3), 56, 4);
          } else if (e.type === "dust" || e.type === "aura-chip") {
            ctx.fillStyle = e.color;
            ctx.fillRect(px(-e.size / 2), px(-e.size / 2), px(e.size), px(e.size));
            if (e.type === "aura-chip") {
              ctx.fillStyle = "rgba(255,255,255,0.5)";
              ctx.fillRect(px(-1), px(-e.size), 2, px(e.size * 1.8));

          }

          ctx.restore();
          ctx.globalAlpha = 1;

      }

      function drawProjectiles() {
        for (const p of projectiles) {
          const dir = Math.sign(p.vx) || p.owner.facing || 1;
          ctx.save();
          if (isFrozenByTimeStop(p.owner)) ctx.filter = "grayscale(1) contrast(1.08) brightness(0.82)";
          ctx.translate(px(p.x), px(p.y));
          ctx.scale(dir, 1);
          if (p.kind === "swordBeam") {
            ctx.fillStyle = p.color;

            ctx.fillStyle = "#d9382f";

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(-5, -5, 10, 10);

              for (let i = 0; i < 12; i += 1) {

            ctx.fillRect(-56, -4, 36, 8);

      function drawParticles() {
        for (const p of particles) {
          const alpha = clamp(p.life / 34, 0, 1);
          ctx.globalAlpha = alpha;
          if (p.text) {
            ctx.font = `800 ${p.size}px ui-sans-serif, system-ui, sans-serif`;
            ctx.fillStyle = "#221911";
            ctx.fillText(p.text, px(p.x + 2), px(p.y + 2));
            ctx.fillStyle = p.color;
            ctx.fillText(p.text, px(p.x), px(p.y));
          } else {
            ctx.fillStyle = p.color;
            ctx.fillRect(px(p.x), px(p.y), px(p.size), px(p.size));
          }
          ctx.globalAlpha = 1;
        }
      }

      function drawBar(x, y, w, h, value, max, color, back, alignRight = false) {
        ctx.fillStyle = "#0a0c11";
        ctx.fillRect(x - 2, y - 2, w + 4, h + 4);
        ctx.fillStyle = back;
        ctx.fillRect(x, y, w, h);
        const fill = clamp(value / max, 0, 1) * w;
        ctx.fillStyle = color;
        if (alignRight) ctx.fillRect(x + w - fill, y, fill, h);
        else ctx.fillRect(x, y, fill, h);
        ctx.fillStyle = "rgba(255, 255, 255, 0.22)";
        if (alignRight) ctx.fillRect(x + w - fill, y, fill, 4);
        else ctx.fillRect(x, y, fill, 4);
      }

        drawBar(W - 302, 56, 260, 12, enemy.energy, ENERGY_MAX, "#5aa9e8", "#17304a", true);
        drawBar(W - 252, 74, 210, 8, enemy.stamina, STAMINA_MAX, "#62c18b", "#153426", true);

          ctx.font = "800 10px ui-sans-serif, system-ui, sans-serif";

          ctx.textAlign = "left";
        }

        ctx.fillStyle = "#f5f0de";
        ctx.font = "800 18px ui-sans-serif, system-ui, sans-serif";
        ctx.fillText(`${gameMode === "pvp" ? t("p1") + " · " : ""}${charName(player.id)}`, 42, 88);
        ctx.textAlign = "right";
        ctx.fillText(`${gameMode === "pvp" ? t("p2") + " · " : t("cpu") + " · "}${charName(enemy.id)}`, W - 42, 88);
        ctx.textAlign = "left";

        if (player.dodgeCd > 0) drawCooldown(42, 104, player.dodgeCd, DODGE_CD_FRAMES, "#d7f1ff");
        if (enemy.dodgeCd > 0) drawCooldown(W - 162, 104, enemy.dodgeCd, DODGE_CD_FRAMES, "#d7f1ff");
        if (player.dodgeCounterWindow > 0) drawCooldown(172, 104, DODGE_COUNTER_WINDOW - player.dodgeCounterWindow, DODGE_COUNTER_WINDOW, "#f6d46e");
        if (enemy.dodgeCounterWindow > 0) drawCooldown(W - 292, 104, DODGE_COUNTER_WINDOW - enemy.dodgeCounterWindow, DODGE_COUNTER_WINDOW, "#f6d46e");
        if (player.skillCd > 0) drawCooldown(42, 116, player.skillCd, SKILL_CD_FRAMES, "#b777ff");
        if (enemy.skillCd > 0) drawCooldown(W - 162, 116, enemy.skillCd, SKILL_CD_FRAMES, "#b777ff");
        if (player.specialCd > 0) drawCooldown(172, 116, player.specialCd, player.id === 9 ? REAPER_GHOST_CD_FRAMES : player.id === 11 ? STAR_RIDER_HORSE_CD_FRAMES : player.id === 12 ? SPIN_COWBOY_HORSE_CD_FRAMES : 150, "#ff5a6f");
        if (enemy.specialCd > 0) drawCooldown(W - 292, 116, enemy.specialCd, enemy.id === 9 ? REAPER_GHOST_CD_FRAMES : enemy.id === 11 ? STAR_RIDER_HORSE_CD_FRAMES : enemy.id === 12 ? SPIN_COWBOY_HORSE_CD_FRAMES : 150, "#ff5a6f");

          ctx.fillStyle = "rgba(0, 0, 0, 0.48)";

      function drawCooldown(x, y, cd, max = 180, color = "#d7f1ff") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.42)";
        ctx.fillRect(x, y, 120, 8);
        ctx.fillStyle = color;
        ctx.fillRect(x, y, 120 * (1 - cd / max), 8);
      }

      function drawAwakenTimer(x, y, f) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.42)";
        ctx.fillRect(x, y, 166, 10);
        ctx.fillStyle = f.data.accent;
        ctx.fillRect(x, y, 166 * (f.awaken / (f.awakenMax || AWAKEN_FRAMES)), 10);
      }

      function drawBattleScene(useTimedColor = true) {
        drawTrails();
        if (enemy.clone) (useTimedColor ? drawCloneTimed(enemy) : drawClone(enemy));
        if (player.clone) (useTimedColor ? drawCloneTimed(player) : drawClone(player));
        if (enemy.ghosts && enemy.ghosts.length) drawReaperGhosts(enemy);
        if (player.ghosts && player.ghosts.length) drawReaperGhosts(player);
        const drawOne = useTimedColor ? drawFighterTimed : drawFighter;
        if (player.x < enemy.x) {
          drawOne(player);
          drawOne(enemy);
        } else {
          drawOne(enemy);
          drawOne(player);
        }
        drawAttackDebug(player);
        drawAttackDebug(enemy);
        drawProjectiles();
        drawEffects();
      }

      function draw() {
        const ox = shakePower > 0 ? rnd(-shakePower, shakePower) : 0;
        const oy = shakePower > 0 ? rnd(-shakePower * 0.55, shakePower * 0.55) : 0;
        ctx.fillStyle = "#10131b";
        ctx.fillRect(0, 0, W, H);
        ctx.save();
        ctx.translate(px(ox), px(oy));
        if (timeStopActive() && player && enemy) {
          ctx.save();
          ctx.filter = "grayscale(1) contrast(1.16) brightness(0.72)";
          renderBackground();
          drawBattleScene(false);
          ctx.restore();
          ctx.fillStyle = "rgba(0, 0, 0, 0.18)";
          ctx.fillRect(0, 0, W, H);
          drawFighter(timeStop.owner);
          if (timeStop.owner.clone) drawClone(timeStop.owner);
        } else {
          renderBackground();
          if (player && enemy) drawBattleScene(true);
          else {
            drawTrails();
            drawAttract();
            drawEffects();
          }
        }
        if (timeStopActive() && player && enemy) {
          ctx.save();
          ctx.filter = "grayscale(1) contrast(1.08) brightness(0.82)";
          drawParticles();
          ctx.restore();
        } else {
          drawParticles();
        }
        ctx.restore();
        if (player && enemy) drawHUD();
        if (screenFlash > 0) {
          ctx.globalAlpha = screenFlash;
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, W, H);
          ctx.globalAlpha = 1;
        }
      }

      function drawAttract() {
        const demoA = makeFighter(selectedChar, "left", true, "normal");
        const nextChar = chars[(chars.findIndex((c) => c.id === selectedChar) + 1 + chars.length) % chars.length].id;
        const demoB = makeFighter(nextChar, "right", false, "normal");
        demoA.x = 330 + Math.sin(frame / 30) * 8;
        demoB.x = 620 + Math.cos(frame / 34) * 8;
        demoA.facing = 1;
        demoB.facing = -1;
        demoA.awaken = frame % 160 > 80 ? 80 : 0;
        demoB.attack = frame % 140 > 94 ? { type: "heavy", timer: 16, windup: 10, active: 12, recovery: 24, hasHit: false } : null;
        drawFighter(demoA);
        drawFighter(demoB);
      }

      function loop() {
        gameStep();
        draw();
        pressed.clear();
        released.clear();
        requestAnimationFrame(loop);
      }

      function drawPortrait(canvasEl, id) {
        const pctx = canvasEl.getContext("2d");

        const data = charById(id);
        const c = data.colors;
        const r = (x, y, w, h, color) => {
          pctx.fillStyle = color;
          pctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
        };
        pctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
        r(0, 0, canvasEl.width, canvasEl.height, "#10141d");
        r(8, 8, canvasEl.width - 16, canvasEl.height - 16, "rgba(255,255,255,0.04)");
        for (let i = 0; i < 5; i += 1) {
          r(20 + i * 28, 132 - i * 5, 16, 3, "rgba(255,255,255,0.08)");

        pctx.translate(82, 143);

          pctx.stroke();
          pctx.strokeStyle = "rgba(255,255,255,0.7)";
          pctx.lineWidth = 2;
          pctx.beginPath();
          pctx.ellipse(-3, -78, 18, 42, 0, 0, Math.PI * 2);
          pctx.stroke();
          r(-42, -4, 84, 7, "rgba(0,0,0,0.38)");
          r(-46, -48, 8, 45, "#6f5238");
          r(-31, -47, 8, 44, "#7c5b3b");
          r(-54, -102, 37, 58, "#f1f8ff");
          r(-49, -96, 27, 47, "#7fd8ff");
          r(-58, -57, 18, 53, "#ffffff");
          r(-34, -57, 18, 53, "#e8eef5");
          r(-67, -91, 9, 50, "#f1f8ff");
          r(-18, -91, 9, 50, "#f1f8ff");
          r(-49, -126, 25, 31, "#f0d6bd");
          r(-55, -136, 37, 10, "#8fe7ff");
